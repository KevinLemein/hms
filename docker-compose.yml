services:
  # ---- Spring Boot Backend ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hms-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env  
    environment:
      SPRING_PROFILES_ACTIVE: docker
      
  # ---- React Frontend (Nginx) ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hms-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
